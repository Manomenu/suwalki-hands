services:
  laminar-postgres:
    image: docker.io/library/postgres:16
    pull_policy: always
    volumes:
      - laminar-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${LMNR_POSTGRES_USER:-lmnr}
      POSTGRES_PASSWORD: ${LMNR_POSTGRES_PASSWORD:-lmnr}
      POSTGRES_DB: ${LMNR_POSTGRES_DB:-lmnr}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${LMNR_POSTGRES_USER:-lmnr}", "-d", "${LMNR_POSTGRES_DB:-lmnr}"]
      interval: 2s
      timeout: 5s
      retries: 5

  laminar-clickhouse:
    image: clickhouse/clickhouse-server:latest
    pull_policy: always
    volumes:
      - laminar-clickhouse-data:/var/lib/clickhouse/
      - laminar-clickhouse-logs:/var/log/clickhouse-server/
      - type: bind
        source: ./clickhouse-profiles-config.xml
        target: /etc/clickhouse-server/users.d/lmnr.xml
    environment:
      CLICKHOUSE_USER: ${LMNR_CLICKHOUSE_USER:-lmnr}
      CLICKHOUSE_PASSWORD: ${LMNR_CLICKHOUSE_PASSWORD:-lmnr}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  laminar-query-engine:
    image: ghcr.io/lmnr-ai/query-engine
    pull_policy: always
    environment:
      PORT: 8903
    healthcheck:
      test: ["CMD", "sleep", "5"]
      interval: 10s
      timeout: 6s
      retries: 3

  laminar-quickwit:
    image: docker.io/quickwit/quickwit:v0.8.2
    pull_policy: always
    environment:
      QW_DATA_DIR: /quickwit/qwdata
    command: ["run"]
    volumes:
      - laminar-quickwit-data:/quickwit/qwdata
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7280/health/livez"]
      interval: 10s
      timeout: 5s
      retries: 3

  laminar-frontend:
    image: ghcr.io/lmnr-ai/frontend
    pull_policy: always
    ports:
      - "127.0.0.1:5667:5667"
    depends_on:
      - laminar-postgres
      - laminar-quickwit
    environment:
      DATABASE_URL: postgres://${LMNR_POSTGRES_USER:-lmnr}:${LMNR_POSTGRES_PASSWORD:-lmnr}@laminar-postgres:5432/${LMNR_POSTGRES_DB:-lmnr}
      PORT: 5667
      BACKEND_URL: http://laminar-app-server:8000
      BACKEND_RT_URL: http://laminar-app-server:8002
      SHARED_SECRET_TOKEN: ${LMNR_SHARED_SECRET_TOKEN:-ebrit-hands-shared-secret}
      NEXTAUTH_URL: http://localhost:5667
      NEXTAUTH_SECRET: ${LMNR_NEXTAUTH_SECRET:-ebrit-hands-nextauth-secret}
      NEXT_PUBLIC_URL: http://localhost:5667
      ENVIRONMENT: LITE
      CLICKHOUSE_URL: http://laminar-clickhouse:8123
      CLICKHOUSE_USER: ${LMNR_CLICKHOUSE_USER:-lmnr}
      CLICKHOUSE_PASSWORD: ${LMNR_CLICKHOUSE_PASSWORD:-lmnr}
      CLICKHOUSE_RO_USER: ${LMNR_CLICKHOUSE_RO_USER:-lmnr}
      CLICKHOUSE_RO_PASSWORD: ${LMNR_CLICKHOUSE_RO_PASSWORD:-lmnr}
      AEAD_SECRET_KEY: ${LMNR_AEAD_SECRET_KEY:-ZWJyaXQtaGFuZHMtbG1uci1hZWFkLXNlY3JldC1rZXk=}
      QUICKWIT_SEARCH_URL: http://laminar-quickwit:7280
      LLM_PROVIDER: ${LMNR_LLM_PROVIDER:-}
      LLM_BASE_URL: ${LMNR_LLM_BASE_URL:-}
      LLM_API_KEY: ${LMNR_LLM_API_KEY:-}
      LLM_MODEL_SMALL: ${LMNR_LLM_MODEL_SMALL:-}
      LLM_MODEL_MEDIUM: ${LMNR_LLM_MODEL_MEDIUM:-}
      LLM_MODEL_LARGE: ${LMNR_LLM_MODEL_LARGE:-}

  laminar-app-server:
    image: ghcr.io/lmnr-ai/app-server
    pull_policy: always
    ports:
      - "127.0.0.1:18000:8000"
      - "127.0.0.1:18001:8001"
      - "127.0.0.1:18002:8002"
    depends_on:
      - laminar-postgres
      - laminar-clickhouse
      - laminar-quickwit
    environment:
      PORT: 8000
      GRPC_PORT: 8001
      DATABASE_URL: postgres://${LMNR_POSTGRES_USER:-lmnr}:${LMNR_POSTGRES_PASSWORD:-lmnr}@laminar-postgres:5432/${LMNR_POSTGRES_DB:-lmnr}
      SHARED_SECRET_TOKEN: ${LMNR_SHARED_SECRET_TOKEN:-ebrit-hands-shared-secret}
      CLICKHOUSE_URL: http://laminar-clickhouse:8123
      CLICKHOUSE_USER: ${LMNR_CLICKHOUSE_USER:-lmnr}
      CLICKHOUSE_PASSWORD: ${LMNR_CLICKHOUSE_PASSWORD:-lmnr}
      CLICKHOUSE_RO_USER: ${LMNR_CLICKHOUSE_RO_USER:-lmnr}
      CLICKHOUSE_RO_PASSWORD: ${LMNR_CLICKHOUSE_RO_PASSWORD:-lmnr}
      ENVIRONMENT: LITE
      AEAD_SECRET_KEY: ${LMNR_AEAD_SECRET_KEY:-ZWJyaXQtaGFuZHMtbG1uci1hZWFkLXNlY3JldC1rZXk=}
      QUERY_ENGINE_URL: http://laminar-query-engine:8903
      QUICKWIT_SEARCH_URL: http://laminar-quickwit:7280
      QUICKWIT_INGEST_URL: http://laminar-quickwit:7281
      QUICKWIT_SPANS_INDEX_ID: spans_v2

volumes:
  laminar-postgres-data:
  laminar-clickhouse-data:
  laminar-clickhouse-logs:
  laminar-quickwit-data:
