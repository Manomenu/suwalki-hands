x-host-gateway: &host-gateway
  extra_hosts:
    - "host.containers.internal:host-gateway"

services:
  ytrack-channel:
    build:
      context: ..
      dockerfile: ebrit_hands_ytrack_channel/Dockerfile
    restart: always
    ports:
      - "127.0.0.1:6010:6010"
    env_file:
      - ../ebrit_hands_ytrack_channel/.env.base
      - ../ebrit_hands_ytrack_channel/.env
    volumes:
      - ../logs:/app/logs
    <<: *host-gateway

  ebrit-hands-web:
    build:
      context: ../ebrit_hands_web
    restart: always
    ports:
      - "127.0.0.1:6011:6011"
    env_file:
      - ../.env
      - ../ebrit_hands_web/.env.base
    environment:
      LOGS_DIR: /app/logs
    volumes:
      - ../logs:/app/logs
    depends_on:
      - ytrack-channel
    <<: *host-gateway

  gitlab-channel:
    build:
      context: ..
      dockerfile: ebrit_hands_gitlab_channel/Dockerfile
    restart: always
    ports:
      - "5085:5085"
    env_file:
      - ../.env.base
      - ../.env
      - ../ebrit_hands_gitlab_channel/.env.base
      - ../ebrit_hands_gitlab_channel/.env
    volumes:
      - ../logs:/app/logs
    <<: *host-gateway

  rproxy:
    image: docker.io/library/nginx:alpine
    restart: always
    ports:
      - "${RPROXY_PORT:-8888}:${RPROXY_PORT:-8888}"
    environment:
      RPROXY_PORT: ${RPROXY_PORT:-8888}
    command: >
      /bin/sh -c "envsubst '$$RPROXY_PORT' < /etc/nginx/templates/rproxy.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    volumes:
      - ./nginx-rproxy.conf.template:/etc/nginx/templates/rproxy.conf.template:ro
    <<: *host-gateway

  ngrok:
    image: docker.io/ngrok/ngrok:latest
    restart: unless-stopped
    command: http host.containers.internal:5085 --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "127.0.0.1:4040:4040"
    <<: *host-gateway
